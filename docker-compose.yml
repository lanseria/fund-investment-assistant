services:
  app:
    build: .
    container_name: fund_investment_assistant
    env_file:
      - .env.production
    ports:
      - '8888:3000'
    restart: unless-stopped
    networks:
      - shared_app_net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

networks:
  shared_app_net:
    external: true
    name: shared-db-network
